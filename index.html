<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>五臟廟健康診斷系統</title>
  <style>
    :root {
      --paper: #f6f1df;
      --ink: #15130e;
      --muted: #6a6255;
      --line: #2b261c;
      --red: #9e1f1f;
      --gold: #b1842f;
      --bg: #16120c;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(177,132,47,.28), transparent 30%),
        radial-gradient(circle at bottom right, rgba(158,31,31,.22), transparent 32%),
        var(--bg);
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Noto Sans TC", monospace;
    }

    body { padding: 18px; }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 18px;
      align-items: start;
    }

    .panel, .receipt {
      background: var(--paper);
      border: 2px solid var(--line);
      box-shadow: 0 16px 50px rgba(0,0,0,.35);
    }

    .panel { padding: 16px; }

    h1, h2, h3, p { margin: 0; }

    .masthead {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 2px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }

    .title h1 {
      font-size: clamp(26px, 4vw, 48px);
      letter-spacing: .08em;
      line-height: 1;
    }

    .title p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .08em;
    }

    .seal {
      width: 72px;
      height: 72px;
      border: 4px double var(--red);
      color: var(--red);
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 900;
      transform: rotate(6deg);
      flex: 0 0 auto;
      text-align: center;
      line-height: 1.05;
    }

    .cameraBox {
      position: relative;
      overflow: hidden;
      border: 2px solid var(--line);
      background: #070604;
      min-height: 520px;
      display: grid;
      place-items: center;
    }

    video, canvas, .photoPreview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    canvas { display: none; }

    .photoPreview { position: absolute; inset: 0; }

    .scanOverlay {
      pointer-events: none;
      position: absolute;
      inset: 0;
      display: none;
      background:
        linear-gradient(transparent 0 48%, rgba(159, 31, 31, .75) 50%, transparent 52%),
        repeating-linear-gradient(0deg, rgba(246,241,223,.05), rgba(246,241,223,.05) 1px, transparent 1px, transparent 7px);
      animation: scan 1.15s linear infinite;
      mix-blend-mode: screen;
    }

    .cameraBox.scanning .scanOverlay { display: block; }

    @keyframes scan {
      0% { transform: translateY(-45%); }
      100% { transform: translateY(45%); }
    }

    .corner {
      position: absolute;
      width: 42px;
      height: 42px;
      border-color: var(--gold);
      border-style: solid;
    }
    .tl { top: 20px; left: 20px; border-width: 4px 0 0 4px; }
    .tr { top: 20px; right: 20px; border-width: 4px 4px 0 0; }
    .bl { bottom: 20px; left: 20px; border-width: 0 0 4px 4px; }
    .br { bottom: 20px; right: 20px; border-width: 0 4px 4px 0; }



    .faceLayer {
      pointer-events: none;
      position: absolute;
      inset: 0;
      z-index: 4;
      display: none;
      font-family: inherit;
      align-items: flex-start;
      justify-content: center;
      padding-top: clamp(22px, 5vh, 62px);
      overflow: hidden;
    }

    .cameraBox.detecting .faceLayer,
    .cameraBox.scanning .faceLayer { display: flex; }

    .guideSvg {
      width: min(64%, 350px);
      height: auto;
      max-height: calc(100% - 116px);
      filter: drop-shadow(0 0 9px rgba(255,219,77,.4));
      overflow: visible;
    }

    .guideLine {
      fill: none;
      stroke: rgba(255, 219, 77, .98);
      stroke-width: 1.8;
      vector-effect: non-scaling-stroke;
    }

    .guideDash {
      stroke-dasharray: 4 4;
    }

    .guideLabelBox {
      fill: rgba(20, 16, 10, .82);
      stroke: rgba(255, 219, 77, .98);
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
    }

    .guideLabelText {
      fill: #ffe88a;
      font-size: 6px;
      font-weight: 800;
      letter-spacing: .08em;
      dominant-baseline: middle;
      text-anchor: middle;
    }

    @media (max-width: 900px) {
      .faceLayer { padding-top: clamp(18px, 4vh, 44px); }
      .guideSvg { width: min(70%, 330px); max-height: calc(100% - 124px); }
      .guideLabelText { font-size: 5.7px; }
    }

    @media (max-width: 480px) {
      .guideSvg { width: min(72%, 300px); max-height: calc(100% - 132px); }
      .guideLabelText { font-size: 5.4px; }
    }

    .adSlot {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 20;
      width: min(360px, calc(100vw - 36px));
      border: 2px solid var(--line);
      background: #071957;
      overflow: hidden;
      box-shadow: 0 12px 36px rgba(0,0,0,.45);
    }

    .adSlot::before {
      content: "Ad";
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 2;
      background: rgba(0,0,0,.72);
      color: white;
      border: 1px solid rgba(255,255,255,.55);
      padding: 2px 8px;
      font-size: 12px;
      letter-spacing: .12em;
    }

    .adSlot img {
      display: block;
      width: 100%;
      max-height: 150px;
      object-fit: cover;
      object-position: center;
    }

    .status {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      color: #f6f1df;
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(246,241,223,.4);
      padding: 12px;
      min-height: 46px;
      letter-spacing: .08em;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: 2px solid var(--line);
      background: var(--ink);
      color: var(--paper);
      padding: 12px 14px;
      font-weight: 800;
      letter-spacing: .08em;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 3px 3px 0 var(--gold);
    }

    button.secondary {
      background: var(--paper);
      color: var(--ink);
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .receipt {
      padding: 14px;
      position: sticky;
      top: 14px;
      background-image:
        repeating-linear-gradient(0deg, rgba(21,19,14,.035), rgba(21,19,14,.035) 1px, transparent 1px, transparent 8px);
    }

    .receiptHead {
      text-align: center;
      border-bottom: 2px dashed var(--line);
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .receiptHead h2 {
      font-size: 26px;
      letter-spacing: .12em;
    }

    .receiptHead small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      letter-spacing: .08em;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dotted var(--line);
      padding: 7px 0;
      font-size: 14px;
    }

    .row b { white-space: nowrap; }

    .sectionTitle {
      margin-top: 12px;
      padding: 6px 8px;
      border: 2px solid var(--line);
      text-align: center;
      font-weight: 900;
      letter-spacing: .18em;
    }

    .organ {
      border-bottom: 1px dashed var(--line);
      padding: 10px 0;
    }

    .organ h3 {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .organ p {
      font-size: 13px;
      line-height: 1.55;
    }

    .grade {
      text-align: center;
      margin: 14px 0 8px;
      border: 4px double var(--red);
      color: var(--red);
      padding: 10px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: .14em;
    }

    .barcode {
      height: 54px;
      margin-top: 12px;
      background: repeating-linear-gradient(90deg, var(--ink) 0 2px, transparent 2px 5px, var(--ink) 5px 8px, transparent 8px 12px);
      opacity: .9;
    }

    .fineprint {
      margin-top: 10px;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .hidden { display: none; }

    @media (max-width: 900px) {
      body { padding: 10px; }
      .app { grid-template-columns: 1fr; }
      .receipt { position: static; }
      .cameraBox { min-height: 56vh; }
      .adSlot { position: static; width: 100%; margin-top: 14px; box-shadow: none; }
      .adSlot img { max-height: 190px; }
    }

    @media print {
      body { background: white; padding: 0; }
      .panel { display: none; }
      .app { display: block; width: 80mm; margin: 0; }
      .receipt { width: 80mm; border: none; box-shadow: none; }
    }
  </style>
</head>
<body>

      ]
    };

    const scanSteps = [
      "正在鎖定面相輪廓...",
      "正在標註五官神位...",
      "正在觀測信徒眼神香火...",
      "正在分析臉部氣色流向...",
      "正在校準五臟神位...",
      "正在擲筊抽取臟器籤...",
      "正在計算功德餘額...",
      "正在連線南天門資料庫...",
      "診斷完成，籤已落地。"
    ];

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function serial() {
      const n = Math.random().toString(36).slice(2, 8).toUpperCase();
      return `WZM-${new Date().getFullYear()}-${n}`;
    }

    function getGrade(score) {
      return grades.find(([, min]) => score >= min)[0];
    }



    function startGuideOverlay() {
      cameraBox.classList.add("detecting");
      statusEl.textContent = "鏡頭已開。請將眼睛、鼻息、口德對準金色輔助線。";
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = stream;
        photoPreview.classList.add("hidden");
        captureBtn.disabled = false;
        startGuideOverlay();
      } catch (err) {
        statusEl.textContent = "鏡頭無法開啟：請確認使用 HTTPS、localhost，並允許瀏覽器相機權限。";
      }
    }

    function capturePhoto() {
      if (!video.videoWidth) return;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      photoPreview.src = canvas.toDataURL("image/jpeg", .88);
      photoPreview.classList.remove("hidden");
    }

    async function runScan() {
      capturePhoto();
      captureBtn.disabled = true;
      againBtn.disabled = true;
      cameraBox.classList.add("scanning");

      for (const step of scanSteps) {
        statusEl.textContent = step;
        await new Promise(r => setTimeout(r, 720));
      }

      const result = generateResult();
      renderResult(result);
      cameraBox.classList.remove("scanning");
      captureBtn.disabled = false;
      againBtn.disabled = false;
    }

    function generateResult() {
      const integrity = rand(26, 96);
      const organs = Object.keys(organDB).map(name => {
        const [state, symptom, offering] = pick(organDB[name]);
        return { name, state, symptom, offering, score: rand(18, 99) };
      });

      return {
        serial: serial(),
        time: new Date().toLocaleString("zh-TW", { hour12: false }),
        persona: pick(personas),
        visualAge: `${rand(19, 68)}歲`,
        integrity: `${integrity}%`,
        incense: `${rand(8, 99)}%`,
        merit: `${rand(0, 88)}%`,
        grade: getGrade(integrity),
        organs
      };
    }

    function renderResult(result) {
      lastResult = result;
      $("serial").textContent = result.serial;
      $("time").textContent = result.time;
      $("persona").textContent = result.persona;
      $("visualAge").textContent = result.visualAge;
      $("integrity").textContent = result.integrity;
      $("incense").textContent = result.incense;
      $("merit").textContent = result.merit;
      $("grade").textContent = result.grade;

      $("organs").innerHTML = result.organs.map(o => `
        <div class="organ">
          <h3><span>${o.name}</span><span>${o.score}</span></h3>
          <p><b>器官狀態：</b>${o.state}</p>
          <p><b>異常現象：</b>${o.symptom}</p>
          <p><b>建議供品：</b>${o.offering}</p>
        </div>
      `).join("");
    }

    function resultToText() {
      if (!lastResult) return "五臟廟健康診斷：尚未抽籤。";
      const r = lastResult;
      return [
        "五臟廟健康診斷",
        `診斷編號：${r.serial}`,
        `診斷時間：${r.time}`,
        `結果名稱：${r.persona}`,
        `視覺年齡：${r.visualAge}`,
        `器官完整度：${r.integrity}`,
        `香火旺盛度：${r.incense}`,
        `功德餘額：${r.merit}`,
        `總評：${r.grade}`,
        "",
        "臨床摘要：",
        ...r.organs.flatMap(o => [
          `${o.name}｜${o.score}`,
          `器官狀態：${o.state}`,
          `異常現象：${o.symptom}`,
          `建議供品：${o.offering}`,
          ""
        ])
      ].join("\n");
    }

    startBtn.addEventListener("click", startCamera);
    captureBtn.addEventListener("click", runScan);
    againBtn.addEventListener("click", () => renderResult(generateResult()));
    printBtn.addEventListener("click", () => window.print());
    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(resultToText());
        statusEl.textContent = "診斷文已複製。";
      } catch {
        statusEl.textContent = "無法自動複製，請手動選取小票內容。";
      }
    });

  </script>
</body>
</html>
