<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>五臟廟健康診斷系統</title>
  <style>
    :root {
      --paper: #f6f1df;
      --ink: #15130e;
      --muted: #6a6255;
      --line: #2b261c;
      --red: #9e1f1f;
      --gold: #b1842f;
      --bg: #16120c;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(177,132,47,.28), transparent 30%),
        radial-gradient(circle at bottom right, rgba(158,31,31,.22), transparent 32%),
        var(--bg);
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Noto Sans TC", monospace;
    }

    body { padding: 18px; }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 18px;
      align-items: start;
    }

    .panel, .receipt {
      background: var(--paper);
      border: 2px solid var(--line);
      box-shadow: 0 16px 50px rgba(0,0,0,.35);
    }

    .panel { padding: 16px; }

    h1, h2, h3, p { margin: 0; }

    .masthead {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 2px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }

    .title h1 {
      font-size: clamp(26px, 4vw, 48px);
      letter-spacing: .08em;
      line-height: 1;
    }

    .title p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .08em;
    }

    .seal {
      width: 72px;
      height: 72px;
      border: 4px double var(--red);
      color: var(--red);
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 900;
      transform: rotate(6deg);
      flex: 0 0 auto;
      text-align: center;
      line-height: 1.05;
    }

    .cameraBox {
      position: relative;
      overflow: hidden;
      border: 2px solid var(--line);
      background: #070604;
      min-height: 520px;
      display: grid;
      place-items: center;
    }

    video, canvas, .photoPreview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    canvas { display: none; }

    .photoPreview { position: absolute; inset: 0; }

    .scanOverlay {
      pointer-events: none;
      position: absolute;
      inset: 0;
      display: none;
      background:
        linear-gradient(transparent 0 48%, rgba(159, 31, 31, .75) 50%, transparent 52%),
        repeating-linear-gradient(0deg, rgba(246,241,223,.05), rgba(246,241,223,.05) 1px, transparent 1px, transparent 7px);
      animation: scan 1.15s linear infinite;
      mix-blend-mode: screen;
    }

    .cameraBox.scanning .scanOverlay { display: block; }

    @keyframes scan {
      0% { transform: translateY(-45%); }
      100% { transform: translateY(45%); }
    }

    .corner {
      position: absolute;
      width: 42px;
      height: 42px;
      border-color: var(--gold);
      border-style: solid;
    }
    .tl { top: 20px; left: 20px; border-width: 4px 0 0 4px; }
    .tr { top: 20px; right: 20px; border-width: 4px 4px 0 0; }
    .bl { bottom: 20px; left: 20px; border-width: 0 0 4px 4px; }
    .br { bottom: 20px; right: 20px; border-width: 0 4px 4px 0; }



    .faceLayer {
      pointer-events: none;
      position: absolute;
      inset: 0;
      z-index: 4;
      display: none;
      font-family: inherit;
    }

    .cameraBox.detecting .faceLayer,
    .cameraBox.scanning .faceLayer { display: block; }

    .faceMark {
      position: absolute;
      display: none;
      border: 2px solid rgba(255, 219, 77, .98);
      color: #ffe88a;
      text-shadow: 0 1px 3px black;
      filter: drop-shadow(0 0 8px rgba(255,219,77,.42));
    }

    .faceMark::before {
      content: attr(data-label);
      position: absolute;
      left: -2px;
      top: -24px;
      background: rgba(0,0,0,.78);
      border: 1px solid rgba(255,219,77,.9);
      padding: 2px 6px;
      font-size: 12px;
      line-height: 1.2;
      letter-spacing: .12em;
      white-space: nowrap;
    }

    .faceMain { border-radius: 44% 44% 48% 48%; border-width: 2px; }
    .facePoint { border-radius: 999px; }
    .faceSkin { border-style: dashed; opacity: .72; }

    .adSlot {
      margin-top: 14px;
      border: 2px solid var(--line);
      background: #071957;
      position: relative;
      overflow: hidden;
    }

    .adSlot::before {
      content: "Ad";
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 2;
      background: rgba(0,0,0,.72);
      color: white;
      border: 1px solid rgba(255,255,255,.55);
      padding: 2px 8px;
      font-size: 12px;
      letter-spacing: .12em;
    }

    .adSlot img {
      display: block;
      width: 100%;
      max-height: 190px;
      object-fit: cover;
      object-position: center;
    }

    .status {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      color: #f6f1df;
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(246,241,223,.4);
      padding: 12px;
      min-height: 46px;
      letter-spacing: .08em;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: 2px solid var(--line);
      background: var(--ink);
      color: var(--paper);
      padding: 12px 14px;
      font-weight: 800;
      letter-spacing: .08em;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 3px 3px 0 var(--gold);
    }

    button.secondary {
      background: var(--paper);
      color: var(--ink);
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .receipt {
      padding: 14px;
      position: sticky;
      top: 14px;
      background-image:
        repeating-linear-gradient(0deg, rgba(21,19,14,.035), rgba(21,19,14,.035) 1px, transparent 1px, transparent 8px);
    }

    .receiptHead {
      text-align: center;
      border-bottom: 2px dashed var(--line);
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .receiptHead h2 {
      font-size: 26px;
      letter-spacing: .12em;
    }

    .receiptHead small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      letter-spacing: .08em;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dotted var(--line);
      padding: 7px 0;
      font-size: 14px;
    }

    .row b { white-space: nowrap; }

    .sectionTitle {
      margin-top: 12px;
      padding: 6px 8px;
      border: 2px solid var(--line);
      text-align: center;
      font-weight: 900;
      letter-spacing: .18em;
    }

    .organ {
      border-bottom: 1px dashed var(--line);
      padding: 10px 0;
    }

    .organ h3 {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .organ p {
      font-size: 13px;
      line-height: 1.55;
    }

    .grade {
      text-align: center;
      margin: 14px 0 8px;
      border: 4px double var(--red);
      color: var(--red);
      padding: 10px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: .14em;
    }

    .barcode {
      height: 54px;
      margin-top: 12px;
      background: repeating-linear-gradient(90deg, var(--ink) 0 2px, transparent 2px 5px, var(--ink) 5px 8px, transparent 8px 12px);
      opacity: .9;
    }

    .fineprint {
      margin-top: 10px;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .hidden { display: none; }

    @media (max-width: 900px) {
      body { padding: 10px; }
      .app { grid-template-columns: 1fr; }
      .receipt { position: static; }
      .cameraBox { min-height: 56vh; }
    }

    @media print {
      body { background: white; padding: 0; }
      .panel { display: none; }
      .app { display: block; width: 80mm; margin: 0; }
      .receipt { width: 80mm; border: none; box-shadow: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="masthead">
        <div class="title">
          <h1>五臟廟</h1>

        <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
        <div id="status" class="status">請開啟鏡頭，將信徒面相置於神位中央。</div>
      </div>

      <div class="controls">
        <button id="startBtn">開啟鏡頭</button>
        <button id="captureBtn" disabled>拍照掃描</button>
        <button id="againBtn" class="secondary" disabled>重新抽籤</button>
        <button id="copyBtn" class="secondary">複製診斷文</button>
        <button id="printBtn" class="secondary">列印小票</button>
      </div>

      <aside class="adSlot" aria-label="Ad">
        <img src="ad.png" alt="Ad" />
      </aside>
    </section>

    <aside id="receipt" class="receipt">
      <div class="receiptHead">
        <h2>五臟廟健康診斷</h2>
        <small>TOAS-05 / 信徒身體巡禮小票</small>
      </div>

      <div class="row"><b>診斷編號</b><span id="serial">尚未降籤</span></div>
      <div class="row"><b>診斷時間</b><span id="time">--</span></div>
      <div class="row"><b>結果名稱</b><span id="persona">等待面相</span></div>
      <div class="row"><b>視覺年齡</b><span id="visualAge">--</span></div>
      <div class="row"><b>器官完整度</b><span id="integrity">--</span></div>
      <div class="row"><b>香火旺盛度</b><span id="incense">--</span></div>
      <div class="row"><b>功德餘額</b><span id="merit">--</span></div>

      <div class="sectionTitle">臨床摘要</div>
      <div id="organs"></div>

      <div id="grade" class="grade">未開籤</div>
      <div class="barcode"></div>
      <p class="fineprint">本小票由五臟廟香火資料庫擲筊生成。請勿與真實醫療院所、保險、政府文件混用。</p>
    </aside>
  </main>

    function videoToBox(x, y, w, h) {
      const cw = cameraBox.clientWidth;
      const ch = cameraBox.clientHeight;
      const vw = video.videoWidth || cw;
      const vh = video.videoHeight || ch;
      const scale = Math.max(cw / vw, ch / vh);
      const renderedW = vw * scale;
      const renderedH = vh * scale;
      const offsetX = (cw - renderedW) / 2;
      const offsetY = (ch - renderedH) / 2;
      return {
        x: offsetX + x * renderedW,
        y: offsetY + y * renderedH,
        w: w * renderedW,
        h: h * renderedH
      };
    }

    function updateFaceOverlay(box) {
      const b = videoToBox(box.x, box.y, box.w, box.h);
      const padX = b.w * .08;
      const padY = b.h * .08;
      const fx = b.x - padX;
      const fy = b.y - padY;
      const fw = b.w + padX * 2;
      const fh = b.h + padY * 2;

      showMark(marks.face, fx, fy, fw, fh);
      showMark(marks.leftEye, fx + fw * .26, fy + fh * .35, fw * .18, fh * .075);
      showMark(marks.rightEye, fx + fw * .56, fy + fh * .35, fw * .18, fh * .075);
      showMark(marks.nose, fx + fw * .46, fy + fh * .45, fw * .09, fh * .17);
      showMark(marks.mouth, fx + fw * .38, fy + fh * .68, fw * .25, fh * .08);
      showMark(marks.skin, fx + fw * .14, fy + fh * .18, fw * .72, fh * .62);
      lastDetectionAt = Date.now();
    }

    async function initFaceTracking() {
      if (detectionMode !== "none") return;

      if ("FaceDetector" in window) {
        try {
          nativeFaceDetector = new FaceDetector({ fastMode: true, maxDetectedFaces: 1 });
          detectionMode = "native";
          return;
        } catch (err) {}
      }

      if (window.FaceDetection) {
        try {
          mpFaceDetection = new FaceDetection({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
          });
          mpFaceDetection.setOptions({ model: "short", minDetectionConfidence: .55 });
          mpFaceDetection.onResults((results) => {
            const detection = results?.detections?.[0];
            const box = detection?.locationData?.relativeBoundingBox;
            if (!box) return;
            updateFaceOverlay({
              x: box.xMin,
              y: box.yMin,
              w: box.width,
              h: box.height
            });
          });
          detectionMode = "mediapipe";
          return;
        } catch (err) {}
      }

      detectionMode = "unsupported";
    }

    async function trackFaceLoop() {
      if (!tracking) return;
      if (!trackingBusy && video.readyState >= 2 && video.videoWidth) {
        trackingBusy = true;
        try {
          if (detectionMode === "native" && nativeFaceDetector) {
            const faces = await nativeFaceDetector.detect(video);
            if (faces && faces[0]?.boundingBox) {
              const box = faces[0].boundingBox;
              updateFaceOverlay({
                x: box.x / video.videoWidth,
                y: box.y / video.videoHeight,
                w: box.width / video.videoWidth,
                h: box.height / video.videoHeight
              });
            }
          } else if (detectionMode === "mediapipe" && mpFaceDetection) {
            await mpFaceDetection.send({ image: video });
          }
        } catch (err) {
          // Keep the kiosk alive even if one frame fails.
        } finally {
          trackingBusy = false;
        }
      }

      if (Date.now() - lastDetectionAt > 1200) hideFaceMarks();
      setTimeout(() => requestAnimationFrame(trackFaceLoop), 90);
    }

    async function startFaceTracking() {
      await initFaceTracking();
      cameraBox.classList.add("detecting");
      tracking = true;
      lastDetectionAt = Date.now();
      if (detectionMode === "unsupported") {
        statusEl.textContent = "鏡頭已開，但此瀏覽器未載入即時面相偵測。仍可拍照抽籤。";
        return;
      }
      requestAnimationFrame(trackFaceLoop);
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = stream;
        photoPreview.classList.add("hidden");
        captureBtn.disabled = false;
        statusEl.textContent = "鏡頭已開。即時面相框正在尋找信徒五官。";
        startFaceTracking();
      } catch (err) {
        statusEl.textContent = "鏡頭無法開啟：請確認使用 HTTPS、localhost，並允許瀏覽器相機權限。";
      }
    }

    function capturePhoto() {
      if (!video.videoWidth) return;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      photoPreview.src = canvas.toDataURL("image/jpeg", .88);
      photoPreview.classList.remove("hidden");
    }

    async function runScan() {
      capturePhoto();
      captureBtn.disabled = true;
      againBtn.disabled = true;
      cameraBox.classList.add("scanning");

      for (const step of scanSteps) {
        statusEl.textContent = step;
        await new Promise(r => setTimeout(r, 720));
      }

      const result = generateResult();
      renderResult(result);
      cameraBox.classList.remove("scanning");
      captureBtn.disabled = false;
      againBtn.disabled = false;
    }

    function generateResult() {
      const integrity = rand(26, 96);
      const organs = Object.keys(organDB).map(name => {
        const [state, symptom, offering] = pick(organDB[name]);
        return { name, state, symptom, offering, score: rand(18, 99) };
      });

      return {
        serial: serial(),
        time: new Date().toLocaleString("zh-TW", { hour12: false }),
        persona: pick(personas),
        visualAge: `${rand(19, 68)}歲`,
        integrity: `${integrity}%`,
        incense: `${rand(8, 99)}%`,
        merit: `${rand(0, 88)}%`,
        grade: getGrade(integrity),
        organs
      };
    }

    function renderResult(result) {
      lastResult = result;
      $("serial").textContent = result.serial;
      $("time").textContent = result.time;
      $("persona").textContent = result.persona;
      $("visualAge").textContent = result.visualAge;
      $("integrity").textContent = result.integrity;
      $("incense").textContent = result.incense;
      $("merit").textContent = result.merit;
      $("grade").textContent = result.grade;

      $("organs").innerHTML = result.organs.map(o => `
        <div class="organ">
          <h3><span>${o.name}</span><span>${o.score}</span></h3>
          <p><b>器官狀態：</b>${o.state}</p>
          <p><b>異常現象：</b>${o.symptom}</p>
          <p><b>建議供品：</b>${o.offering}</p>
        </div>
      `).join("");
    }

    function resultToText() {
      const r = lastResult || generateResult();
      return [
        "五臟廟健康診斷",
        `診斷編號：${r.serial}`,
        `診斷時間：${r.time}`,
        `結果名稱：${r.persona}`,
        `視覺年齡：${r.visualAge}`,
        `器官完整度：${r.integrity}`,
        `香火旺盛度：${r.incense}`,
        `功德餘額：${r.merit}`,
        `總評：${r.grade}`,
        "",
        "臨床摘要：",
        ...r.organs.flatMap(o => [
          `${o.name}｜${o.score}`,
          `器官狀態：${o.state}`,
          `異常現象：${o.symptom}`,
          `建議供品：${o.offering}`,
          ""
        ])
      ].join("\n");
    }

    startBtn.addEventListener("click", startCamera);
    captureBtn.addEventListener("click", runScan);
    againBtn.addEventListener("click", () => renderResult(generateResult()));
    printBtn.addEventListener("click", () => window.print());
    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(resultToText());
        statusEl.textContent = "診斷文已複製。";
      } catch {
        statusEl.textContent = "無法自動複製，請手動選取小票內容。";
      }
    });

    renderResult(generateResult());
  </script>
</body>
</html>
